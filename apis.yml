    description: The Windmill API provides programmatic access to the Windmill developer platform, enabling management of scripts,
      flows, apps, resources, variables, schedules, jobs, users, workspaces, and webhooks. It follows the OpenAPI 3.0.3 specification
      and powers all interactions with the Windmill platform.
