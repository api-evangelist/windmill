aid: windmill
name: Windmill
segments:
  - ProCode_API_Composition
  - Workflows
description: >-
  Windmill is an open-source developer platform and workflow engine for turning
  scripts into webhooks, workflows, and internal apps. It supports TypeScript,
  Python, Go, PHP, Bash, C#, SQL, and Rust, and serves as an open-source
  alternative to Retool, Airflow, and Temporal for building comprehensive
  internal tools including endpoints, workflows, and UIs.
