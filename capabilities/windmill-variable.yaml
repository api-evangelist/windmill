      operations:
      - method: GET
        name: listvariable
        description: List Variables
        call: windmill-variable.listvariable
        with:
          path_start: rest.path_start
          path: rest.path
          description: rest.description
          value: rest.value
          broad_filter: rest.broad_filter
          label: rest.label
        outputParameters:
