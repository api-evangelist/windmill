naftiko: 1.0.0-alpha2
info:
  label: Windmill API — documentation
  description: 'Windmill API — documentation. 1 operations. Lead operation: Query Windmill AI Documentation Assistant (EE
    Only). Self-contained Naftiko capability covering one Windmill business surface.'
  tags:
  - Windmill
  - documentation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WINDMILL_API_KEY: WINDMILL_API_KEY
capability:
  consumes:
  - type: http
    namespace: windmill-documentation
    baseUri: ''
    description: Windmill API — documentation business capability. Self-contained, no shared references.
    resources:
    - name: inkeep
      path: /inkeep
      operations:
      - name: querydocumentation
        method: POST
        description: Query Windmill AI Documentation Assistant (EE Only)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WINDMILL_API_KEY}}'
  exposes:
  - type: rest
    namespace: windmill-documentation-rest
    port: 8080
    description: REST adapter for Windmill API — documentation. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/inkeep
      name: inkeep
      description: REST surface for inkeep.
      operations:
      - method: POST
        name: querydocumentation
        description: Query Windmill AI Documentation Assistant (EE Only)
        call: windmill-documentation.querydocumentation
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: windmill-documentation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Windmill API — documentation. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: query-windmill-ai-documentation-assistant
      description: Query Windmill AI Documentation Assistant (EE Only)
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: windmill-documentation.querydocumentation
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
