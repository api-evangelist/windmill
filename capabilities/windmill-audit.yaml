naftiko: 1.0.0-alpha2
info:
  label: Windmill API — audit
  description: 'Windmill API — audit. 2 operations. Lead operation: Get Audit Log (requires Admin Privilege). Self-contained
    Naftiko capability covering one Windmill business surface.'
  tags:
  - Windmill
  - audit
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WINDMILL_API_KEY: WINDMILL_API_KEY
capability:
  consumes:
  - type: http
    namespace: windmill-audit
    baseUri: ''
    description: Windmill API — audit business capability. Self-contained, no shared references.
    resources:
    - name: w-workspace-audit-get-id
      path: /w/{workspace}/audit/get/{id}
      operations:
      - name: getauditlog
        method: GET
        description: Get Audit Log (requires Admin Privilege)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: w-workspace-audit-list
      path: /w/{workspace}/audit/list
      operations:
      - name: listauditlogs
        method: GET
        description: List Audit Logs (requires Admin Privilege)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: operations
          in: query
          type: string
          description: comma separated list of exact operations to include
        - name: exclude_operations
          in: query
          type: string
          description: comma separated list of operations to exclude
        - name: all_workspaces
          in: query
          type: boolean
          description: get audit logs for all workspaces
    authentication:
      type: bearer
      token: '{{env.WINDMILL_API_KEY}}'
  exposes:
  - type: rest
    namespace: windmill-audit-rest
    port: 8080
    description: REST adapter for Windmill API — audit. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/w/{workspace}/audit/get/{id}
      name: w-workspace-audit-get-id
      description: REST surface for w-workspace-audit-get-id.
      operations:
      - method: GET
        name: getauditlog
        description: Get Audit Log (requires Admin Privilege)
        call: windmill-audit.getauditlog
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/w/{workspace}/audit/list
      name: w-workspace-audit-list
      description: REST surface for w-workspace-audit-list.
      operations:
      - method: GET
        name: listauditlogs
        description: List Audit Logs (requires Admin Privilege)
        call: windmill-audit.listauditlogs
        with:
          operations: rest.operations
          exclude_operations: rest.exclude_operations
          all_workspaces: rest.all_workspaces
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: windmill-audit-mcp
    port: 9090
    transport: http
    description: MCP adapter for Windmill API — audit. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-audit-log-requires-admin
      description: Get Audit Log (requires Admin Privilege)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: windmill-audit.getauditlog
      outputParameters:
      - type: object
        mapping: $.
    - name: list-audit-logs-requires-admin
      description: List Audit Logs (requires Admin Privilege)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: windmill-audit.listauditlogs
      with:
        operations: tools.operations
        exclude_operations: tools.exclude_operations
        all_workspaces: tools.all_workspaces
      outputParameters:
      - type: object
        mapping: $.
