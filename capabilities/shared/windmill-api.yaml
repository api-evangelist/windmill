naftiko: "1.0.0-alpha1"

info:
  label: "Windmill API"
  description: >-
    The Windmill API provides programmatic access to the Windmill developer platform,
    enabling management of scripts, flows, apps, resources, variables, schedules,
    jobs, users, workspaces, and webhooks. Supports workflow automation, job
    execution, and internal tool management.
  tags:
    - Windmill
    - Automation
    - Workflows
    - Scripts
    - Jobs
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WINDMILL_TOKEN: WINDMILL_TOKEN

capability:
  consumes:
    - type: http
      namespace: windmill
      baseUri: https://app.windmill.dev/api
      description: "Windmill platform API for workflow automation and script management"
      authentication:
        type: bearer
        token: "{{WINDMILL_TOKEN}}"
      resources:
        - name: scripts
          path: /w/{workspace}/scripts
          description: "Script management and execution"
          operations:
            - name: create-script
              method: POST
              description: "Create Script"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
              body:
                type: json
                data:
                  path: "{{tools.path}}"
                  content: "{{tools.content}}"
                  language: "{{tools.language}}"
                  summary: "{{tools.summary}}"
                  description: "{{tools.description}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: string
                  value: "$."

            - name: list-scripts
              method: GET
              description: "List Scripts"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: "Number of results per page"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-script-by-path
              method: GET
              description: "Get Script by Path"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Script path"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-script-by-path
              method: DELETE
              description: "Delete Script by Path"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Script path"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: flows
          path: /w/{workspace}/flows
          description: "Flow management and execution"
          operations:
            - name: create-flow
              method: POST
              description: "Create Flow"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
              body:
                type: json
                data:
                  path: "{{tools.path}}"
                  summary: "{{tools.summary}}"
                  description: "{{tools.description}}"
                  value: "{{tools.value}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: string
                  value: "$."

            - name: list-flows
              method: GET
              description: "List Flows"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: "Number of results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-flow-by-path
              method: GET
              description: "Get Flow by Path"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Flow path"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: jobs
          path: /w/{workspace}/jobs
          description: "Job execution and monitoring"
          operations:
            - name: run-script-by-path
              method: POST
              description: "Run Script by Path"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
                - name: path
                  in: path
                  type: string
                  required: true
                  description: "Script path"
              body:
                type: json
                data:
                  args: "{{tools.args}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: string
                  value: "$."

            - name: list-completed-jobs
              method: GET
              description: "List Completed Jobs"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: "Number of results per page"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-completed-job
              method: GET
              description: "Get Completed Job"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Job identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: cancel-queued-job
              method: POST
              description: "Cancel Queued Job"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Job identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: schedules
          path: /w/{workspace}/schedules
          description: "Schedule management"
          operations:
            - name: create-schedule
              method: POST
              description: "Create Schedule"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
              body:
                type: json
                data:
                  path: "{{tools.path}}"
                  schedule: "{{tools.schedule}}"
                  script_path: "{{tools.script_path}}"
                  is_flow: "{{tools.is_flow}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: string
                  value: "$."

            - name: list-schedules
              method: GET
              description: "List Schedules"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: resources
          path: /w/{workspace}/resources
          description: "Resource management"
          operations:
            - name: create-resource
              method: POST
              description: "Create Resource"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
              body:
                type: json
                data:
                  path: "{{tools.path}}"
                  resource_type: "{{tools.resource_type}}"
                  value: "{{tools.value}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: string
                  value: "$."

            - name: list-resources
              method: GET
              description: "List Resources"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: workspaces
          path: /workspaces
          description: "Workspace administration"
          operations:
            - name: list-workspaces
              method: GET
              description: "List Workspaces"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-workspace
              method: POST
              description: "Create Workspace"
              body:
                type: json
                data:
                  id: "{{tools.id}}"
                  name: "{{tools.name}}"
                  username: "{{tools.username}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: string
                  value: "$."

        - name: users
          path: /w/{workspace}/users
          description: "User management"
          operations:
            - name: list-users
              method: GET
              description: "List Users in Workspace"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: variables
          path: /w/{workspace}/variables
          description: "Variable management"
          operations:
            - name: create-variable
              method: POST
              description: "Create Variable"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
              body:
                type: json
                data:
                  path: "{{tools.path}}"
                  value: "{{tools.value}}"
                  is_secret: "{{tools.is_secret}}"
                  description: "{{tools.description}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: string
                  value: "$."

            - name: list-contextual-variables
              method: GET
              description: "List Contextual Variables"
              inputParameters:
                - name: workspace
                  in: path
                  type: string
                  required: true
                  description: "Workspace identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: windmill-shared-api
      resources:
        - path: /v1/scripts
          name: scripts
          description: "Script management"
          operations:
            - method: GET
              name: list-scripts
              description: "List Scripts"
              call: "windmill.list-scripts"
              with:
                workspace: "rest.workspace"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-script
              description: "Create Script"
              call: "windmill.create-script"
              with:
                workspace: "rest.workspace"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/flows
          name: flows
          description: "Flow management"
          operations:
            - method: GET
              name: list-flows
              description: "List Flows"
              call: "windmill.list-flows"
              with:
                workspace: "rest.workspace"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/jobs
          name: jobs
          description: "Job management"
          operations:
            - method: GET
              name: list-completed-jobs
              description: "List Completed Jobs"
              call: "windmill.list-completed-jobs"
              with:
                workspace: "rest.workspace"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: windmill-shared-mcp
      transport: http
      tools:
        - name: list-scripts
          description: "List Scripts in Windmill workspace"
          hints:
            readOnly: true
            openWorld: true
          call: "windmill.list-scripts"
          with:
            workspace: "tools.workspace"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-script
          description: "Create a new Script in Windmill workspace"
          hints:
            readOnly: false
            destructive: false
          call: "windmill.create-script"
          with:
            workspace: "tools.workspace"
          outputParameters:
            - type: object
              mapping: "$."
        - name: run-script
          description: "Execute a Script by path in Windmill workspace"
          hints:
            readOnly: false
            destructive: false
          call: "windmill.run-script-by-path"
          with:
            workspace: "tools.workspace"
            path: "tools.path"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-jobs
          description: "List completed jobs in Windmill workspace"
          hints:
            readOnly: true
            openWorld: true
          call: "windmill.list-completed-jobs"
          with:
            workspace: "tools.workspace"
          outputParameters:
            - type: object
              mapping: "$."
