        - name: first_parent_hash
          in: query
          type: string
          description: mask to filter scripts whom first direct parent has exact hash
        - name: last_parent_hash
          in: query
          type: string
          description: mask to filter scripts whom last parent in the chain has exact hash.
        - name: parent_hash
          in: query
          type: string
