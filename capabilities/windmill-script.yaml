  description: 'Windmill API — script. 34 operations. Lead operation: Query Hub Scripts by Similarity. Self-contained Naftiko
    capability covering one Windmill business surface.'
  tags:
  - Windmill
  - script
  created: '2026-05-19'
  modified: '2026-05-19'
