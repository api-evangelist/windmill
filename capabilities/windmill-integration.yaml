naftiko: 1.0.0-alpha2
info:
  label: Windmill API — integration
  description: 'Windmill API — integration. 1 operations. Lead operation: List Hub Integrations. Self-contained Naftiko capability
    covering one Windmill business surface.'
  tags:
  - Windmill
  - integration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WINDMILL_API_KEY: WINDMILL_API_KEY
capability:
  consumes:
  - type: http
    namespace: windmill-integration
    baseUri: ''
    description: Windmill API — integration business capability. Self-contained, no shared references.
    resources:
    - name: integrations-hub-list
      path: /integrations/hub/list
      operations:
      - name: listhubintegrations
        method: GET
        description: List Hub Integrations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: kind
          in: query
          type: string
          description: query integrations kind
    authentication:
      type: bearer
      token: '{{env.WINDMILL_API_KEY}}'
  exposes:
  - type: rest
    namespace: windmill-integration-rest
    port: 8080
    description: REST adapter for Windmill API — integration. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/integrations/hub/list
      name: integrations-hub-list
      description: REST surface for integrations-hub-list.
      operations:
      - method: GET
        name: listhubintegrations
        description: List Hub Integrations
        call: windmill-integration.listhubintegrations
        with:
          kind: rest.kind
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: windmill-integration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Windmill API — integration. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-hub-integrations
      description: List Hub Integrations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: windmill-integration.listhubintegrations
      with:
        kind: tools.kind
      outputParameters:
      - type: object
        mapping: $.
