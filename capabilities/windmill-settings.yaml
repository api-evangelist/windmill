naftiko: 1.0.0-alpha2
info:
  label: Windmill API — settings
  description: 'Windmill API — settings. 4 operations. Lead operation: Get License Id. Self-contained Naftiko capability covering
    one Windmill business surface.'
  tags:
  - Windmill
  - settings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WINDMILL_API_KEY: WINDMILL_API_KEY
capability:
  consumes:
  - type: http
    namespace: windmill-settings
    baseUri: ''
    description: Windmill API — settings business capability. Self-contained, no shared references.
    resources:
    - name: ee_license
      path: /ee_license
      operations:
      - name: getlicenseid
        method: GET
        description: Get License Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: openapi.yaml
      path: /openapi.yaml
      operations:
      - name: getopenapiyaml
        method: GET
        description: Get Openapi Yaml Spec
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: uptodate
      path: /uptodate
      operations:
      - name: backenduptodate
        method: GET
        description: Is Backend up to Date
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: version
      path: /version
      operations:
      - name: backendversion
        method: GET
        description: Get Backend Version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WINDMILL_API_KEY}}'
  exposes:
  - type: rest
    namespace: windmill-settings-rest
    port: 8080
    description: REST adapter for Windmill API — settings. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/ee-license
      name: ee-license
      description: REST surface for ee_license.
      operations:
      - method: GET
        name: getlicenseid
        description: Get License Id
        call: windmill-settings.getlicenseid
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/openapi-yaml
      name: openapi-yaml
      description: REST surface for openapi.yaml.
      operations:
      - method: GET
        name: getopenapiyaml
        description: Get Openapi Yaml Spec
        call: windmill-settings.getopenapiyaml
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/uptodate
      name: uptodate
      description: REST surface for uptodate.
      operations:
      - method: GET
        name: backenduptodate
        description: Is Backend up to Date
        call: windmill-settings.backenduptodate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/version
      name: version
      description: REST surface for version.
      operations:
      - method: GET
        name: backendversion
        description: Get Backend Version
        call: windmill-settings.backendversion
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: windmill-settings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Windmill API — settings. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-license-id
      description: Get License Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: windmill-settings.getlicenseid
      outputParameters:
      - type: object
        mapping: $.
    - name: get-openapi-yaml-spec
      description: Get Openapi Yaml Spec
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: windmill-settings.getopenapiyaml
      outputParameters:
      - type: object
        mapping: $.
    - name: is-backend-up-date
      description: Is Backend up to Date
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: windmill-settings.backenduptodate
      outputParameters:
      - type: object
        mapping: $.
    - name: get-backend-version
      description: Get Backend Version
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: windmill-settings.backendversion
      outputParameters:
      - type: object
        mapping: $.
