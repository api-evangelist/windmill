      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: windmill-setting.workspaceacknowledgecriticalalert
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-secondary-storage-names
      description: Get Secondary Storage Names
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: windmill-setting.getsecondarystoragenames
      with:
        include_default: tools.include_default
      outputParameters:
      - type: object
        mapping: $.
    - name: set-public-app-rate-limit
      description: Set Public App Rate Limit for this Workspace
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: windmill-setting.setpublicappratelimit
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
