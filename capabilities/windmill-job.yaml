  - type: rest
    namespace: windmill-job-rest
    port: 8080
    description: REST adapter for Windmill API — job. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/jobs/completed/count-by-tag
      name: jobs-completed-count-by-tag
      description: REST surface for jobs-completed-count_by_tag.
      operations:
      - method: GET
        name: countjobsbytag
        description: Count Jobs by Tag
        call: windmill-job.countjobsbytag
        with:
          horizon_secs: rest.horizon_secs
          workspace_id: rest.workspace_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobs/db-clock
      name: jobs-db-clock
      description: REST surface for jobs-db_clock.
      operations:
      - method: GET
        name: getdbclock
        description: Get Db Clock
        call: windmill-job.getdbclock
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/w/{workspace}/concurrency-groups/list-jobs
      name: w-workspace-concurrency-groups-list-jobs
      description: REST surface for w-workspace-concurrency_groups-list_jobs.
      operations:
      - method: GET
        name: listextendedjobs
        description: Get Intervals of Job Runtime Concurrency
        call: windmill-job.listextendedjobs
        with:
          concurrency_key: rest.concurrency_key
          row_limit: rest.row_limit
          is_skipped: rest.is_skipped
          is_flow_step: rest.is_flow_step
          has_null_parent: rest.has_null_parent
          success: rest.success
          all_workspaces: rest.all_workspaces
          is_not_schedule: rest.is_not_schedule
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/w/{workspace}/jobs/completed/count
      name: w-workspace-jobs-completed-count
      description: REST surface for w-workspace-jobs-completed-count.
      operations:
      - method: GET
        name: getcompletedcount
        description: Get Completed Count
        call: windmill-job.getcompletedcount
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/w/{workspace}/jobs/completed/count-jobs
      name: w-workspace-jobs-completed-count-jobs
      description: REST surface for w-workspace-jobs-completed-count_jobs.
      operations:
      - method: GET
        name: countcompletedjobs
        description: Count Number of Completed Jobs with Filter
